if(type==='purpleWisp'){const g=new THREE.Group(),shell=new THREE.Mesh(new THREE.SphereGeometry(.68,14,14),new THREE.MeshStandardMaterial({color:0xb87ed6,transparent:true,opacity:.4,emissive:0x422058,emissiveIntensity:.62,roughness:.3})),core=new THREE.Mesh(new THREE.SphereGeometry(.33,12,12),new THREE.MeshStandardMaterial({color:0xf3e8ff,emissive:0xa855f7,emissiveIntensity:.95,roughness:.15})),og=new THREE.Group(),om=new THREE.MeshStandardMaterial({color:0xd7b4ff,emissive:0x6d28d9,emissiveIntensity:.65,roughness:.45}),o1=new THREE.Mesh(new THREE.SphereGeometry(.16,8,8),om),o2=new THREE.Mesh(new THREE.SphereGeometry(.14,8,8),om),o3=new THREE.Mesh(new THREE.SphereGeometry(.12,8,8),om),light=new THREE.PointLight(0xbb7dff,1.45,16,2);o1.position.set(1.05,0,0);o2.position.set(-.95,.2,.12);o3.position.set(.2,-.9,-.22);og.add(o1,o2,o3);g.add(shell,core,og,light);const hit=new THREE.Mesh(new THREE.SphereGeometry(1.08),new THREE.MeshBasicMaterial({visible:false}));g.add(hit);return{mesh:g,hit,type,speed:.065,phase:Math.random()*Math.PI*2,og,update:(e,ts,t)=>{e.og.rotation.y+=.06*ts;e.og.rotation.z+=.015*ts;e.mesh.scale.setScalar(1+Math.sin(t*2.6+e.phase)*.05);e.mesh.position.y+=Math.sin(t*2.1+e.phase)*.024*ts;}};}
const g=new THREE.Group(),body=new THREE.Mesh(new THREE.SphereGeometry(.2,10,10),new THREE.MeshStandardMaterial({color:0xffe8a0,emissive:0xffa500,emissiveIntensity:.95,roughness:.4})),wm=new THREE.MeshStandardMaterial({color:0xf5fdff,transparent:true,opacity:.55,side:THREE.DoubleSide,roughness:.2}),wg=new THREE.PlaneGeometry(.46,.28),wr=new THREE.Mesh(wg,wm),wl=new THREE.Mesh(wg,wm),t1=new THREE.Mesh(new THREE.SphereGeometry(.08,8,8),new THREE.MeshBasicMaterial({color:0xffbf54})),t2=new THREE.Mesh(new THREE.SphereGeometry(.08,8,8),new THREE.MeshBasicMaterial({color:0xffbf54})),light=new THREE.PointLight(0xffa500,1.3,12,2);wr.position.set(.18,.18,0);wl.position.set(-.18,.18,0);t1.position.set(.24,-.14,0);t2.position.set(-.24,-.14,0);g.add(body,wr,wl,t1,t2,light);const hit=new THREE.Mesh(new THREE.SphereGeometry(.92),new THREE.MeshBasicMaterial({visible:false}));g.add(hit);return{mesh:g,hit,type:'firefly',speed:.078,phase:Math.random()*Math.PI*2,wr,wl,light,update:(e,ts,t)=>{const f=Math.sin(t*19+e.phase)*.7;e.wr.rotation.z=f;e.wl.rotation.z=-f;e.mesh.position.x+=Math.sin(t*3+e.phase)*.01*ts;e.mesh.position.y+=Math.cos(t*4.5+e.phase)*.017*ts;e.light.intensity=1+Math.sin(t*8+e.phase)*.35;}};}
function spawnEnemy(){if(!isPlaying)return;const ang=(Math.random()-.5)*(Math.PI*.5),roll=Math.random(),type=roll<.25?'skyStar':roll<.5?'butterfly':roll<.75?'purpleWisp':'firefly',e=enemyByType(type);e.mesh.position.set(Math.sin(ang)*48,type==='skyStar'?10+Math.random()*5:type==='butterfly'?1.8+Math.random()*2.6:type==='purpleWisp'?1.2+Math.random()*2:2+Math.random()*2.8,-Math.cos(ang)*48);scene.add(e.mesh);enemies.push(e);}
function autoAttack(){if(!isPlaying)return;raycaster.setFromCamera(new THREE.Vector2(0,0),camera);const hits=raycaster.intersectObjects(enemies.map(e=>e.hit),false);if(!hits.length){document.getElementById('crosshair').classList.remove('locked');return;}document.getElementById('crosshair').classList.add('locked');const idx=enemies.findIndex(e=>e.hit===hits[0].object);if(idx<0)return;const e=enemies[idx];playCozySound(e.type);for(let i=0;i<15;i++)sparkles.push(new Sparkle(w2D/2,h2D/2,e.type));scene.remove(e.mesh);enemies.splice(idx,1);score+=10;document.getElementById('scoreDisplay').innerText=`Cozy: ${score}`;}
function takeDamage(){hp-=20;document.getElementById('hpBar').style.width=`${hp}%`;const f=document.getElementById('damageFlash');f.style.opacity=.5;setTimeout(()=>f.style.opacity=0,100);if(hp>0)return;isPlaying=false;clearInterval(enemySpawnInterval);document.getElementById('gameUI').style.display='none';document.getElementById('gameOverMenu').style.display='flex';document.getElementById('finalScore').innerText=`Skor Terkumpul: ${score}`;}
function updateEnv(dt,ts,t){if(moonRig)moonRig.position.x=Math.sin(t*.05)*10;for(const s of swaying)s.mesh.rotation.z=Math.sin(t*.65+s.phase)*s.amp;for(const l of lanterns)l.light.intensity=l.base+Math.sin(t*4.2+l.phase)*.12;for(const f of ambientFireflies){f.angle+=f.speed*dt;f.mesh.position.x=Math.cos(f.angle)*f.radius;f.mesh.position.z=Math.sin(f.angle)*f.radius;f.mesh.position.y=f.height+Math.sin(t*2.2+f.pulse)*.35;const p=.55+Math.sin(t*6+f.pulse)*.45;f.mesh.material.opacity=.4+p*.6;f.mesh.material.transparent=true;}for(let i=0;i<rainSpeed.length;i++){const yi=i*3+1;rainPos[yi]-=rainSpeed[i]*ts;rainPos[i*3]+=Math.sin(clock.elapsedTime*.7+i)*.003;if(rainPos[yi]<0)rainPos[yi]=50;}rainGeo.attributes.position.needsUpdate=true;}
function animate(){requestAnimationFrame(animate);let dt=clock.getDelta();if(dt>.1)dt=.1;const ts=dt*60,t=clock.elapsedTime;if(isPlaying){if(!hasCenteredInitially){centerCamera();hasCenteredInitially=true;}camera.rotation.set(rotationX,rotationY,0);autoAttack();for(let i=enemies.length-1;i>=0;i--){const e=enemies[i],dir=new THREE.Vector3().subVectors(camera.position,e.mesh.position).normalize();e.mesh.position.add(dir.multiplyScalar(e.speed*ts));e.mesh.lookAt(camera.position);e.update(e,ts,t);if(e.mesh.position.distanceTo(camera.position)<2.5){scene.remove(e.mesh);enemies.splice(i,1);takeDamage();}}}updateEnv(dt,ts,t);renderer.render(scene,camera);ctx2D.clearRect(0,0,w2D,h2D);for(let i=sparkles.length-1;i>=0;i--){const s=sparkles[i];s.update(ts);if(s.life<=0)sparkles.splice(i,1);else s.draw();}}
function startGame(){document.getElementById('mainMenu').style.display='none';document.getElementById('gameUI').style.display='block';hasCenteredInitially=false;initAudio();if(!scene)init3D();score=0;hp=100;for(const e of enemies)scene.remove(e.mesh);enemies=[];isPlaying=true;document.getElementById('scoreDisplay').innerText='Cozy: 0';document.getElementById('hpBar').style.width='100%';clock.start();if(!animationStarted){animationStarted=true;animate();}clearInterval(enemySpawnInterval);enemySpawnInterval=setInterval(spawnEnemy,1500);}
addEventListener('resize',()=>{w2D=innerWidth;h2D=innerHeight;canvas2D.width=w2D;canvas2D.height=h2D;if(!camera||!renderer)return;camera.aspect=w2D/h2D;camera.updateProjectionMatrix();renderer.setSize(w2D,h2D);renderer.setPixelRatio(Math.min(devicePixelRatio||1,1.5));});
</script>
